<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restablecer Contraseña</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .container {
      background: white;
      padding: 24px 32px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      max-width: 400px;
      width: 100%;
      box-sizing: border-box;
    }
    h2 {
      margin-top: 0;
      margin-bottom: 16px;
      color: #222;
    }
    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #333;
    }
    input[type="password"] {
      width: 100%;
      padding: 10px;
      margin-bottom: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 16px;
      box-sizing: border-box;
    }
    button {
      background-color: #BE0C0C;
      border: none;
      color: white;
      width: 100%;
      padding: 14px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s ease;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    button:disabled {
      background-color: #d67f7f;
      cursor: not-allowed;
    }
    button:hover:not(:disabled) {
      background-color: #900808;
    }
    .spinner {
      border: 3px solid #fff;
      border-top: 3px solid #900808;
      border-radius: 50%;
      width: 20px;
      height: 20px;
      animation: spin 1s linear infinite;
      margin-left: 8px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg);}
      100% { transform: rotate(360deg);}
    }
    .message {
      margin-top: 16px;
      font-size: 14px;
      padding: 10px;
      border-radius: 6px;
      display: none;
    }
    .message.show {
      display: block;
    }
    .error {
      background-color: #f8d7da;
      color: #842029;
      border: 1px solid #f5c2c7;
    }
    .success {
      background-color: #d1e7dd;
      color: #0f5132;
      border: 1px solid #badbcc;
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    .modal-overlay.active {
      display: flex;
    }
    .modal {
      background: white;
      padding: 24px;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 300px;
      width: 90%;
    }
    .modal h3 {
      margin-top: 0;
      color: #0f5132;
    }
    .modal button {
      margin-top: 20px;
      background-color: #0f5132;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Restablecer Contraseña</h2>
    <form id="resetForm" novalidate>
      <label for="newPassword">Nueva contraseña</label>
      <input type="password" id="newPassword" name="newPassword" placeholder="Ingresa tu nueva contraseña" required />

      <label for="confirmPassword">Confirmar contraseña</label>
      <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirma tu nueva contraseña" required />

      <button type="submit" id="submitBtn">
        Guardar nueva contraseña
      </button>
    </form>
    <div id="message" class="message"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal-overlay">
    <div class="modal">
      <h3>¡Contraseña cambiada correctamente!</h3>
      <p>Ahora puedes iniciar sesión desde la app.</p>
      <button id="modalCloseBtn">Cerrar</button>
    </div>
  </div>

  <script>
    const form = document.getElementById('resetForm');
    const messageEl = document.getElementById('message');
    const submitBtn = document.getElementById('submitBtn');
    const modal = document.getElementById('modal');
    const modalCloseBtn = document.getElementById('modalCloseBtn');

    const baseUrl = 'http://20.251.145.196:5000';
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
      showMessage('Token no válido o no encontrado en la URL.', 'error');
      submitBtn.disabled = true;
    }

    function showMessage(msg, type = 'error') {
      messageEl.textContent = msg;
      messageEl.className = 'message show ' + (type === 'success' ? 'success' : 'error');
    }

    function validatePassword(password) {
      const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
      return regex.test(password);
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      messageEl.style.display = 'none';

      const newPassword = form.newPassword.value.trim();
      const confirmPassword = form.confirmPassword.value.trim();

      if (!newPassword) {
        showMessage('La contraseña es obligatoria.');
        return;
      }
      if (!validatePassword(newPassword)) {
        showMessage('Debe tener al menos 8 caracteres, una mayúscula, una minúscula y un número.');
        return;
      }
      if (!confirmPassword) {
        showMessage('Confirma tu contraseña.');
        return;
      }
      if (newPassword !== confirmPassword) {
        showMessage('Las contraseñas no coinciden.');
        return;
      }

      submitBtn.disabled = true;
      submitBtn.innerHTML = 'Guardando... <span class="spinner"></span>';

      try {
        const res = await fetch(`${baseUrl}/api/auth/reset-password/${token}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nuevaPassword: newPassword }),
        });

        const data = await res.json();

        if (res.ok) {
          form.reset();
          modal.classList.add('active');
        } else if (res.status === 400 && data.mensaje?.toLowerCase().includes('token')) {
          showMessage(data.mensaje || 'Token inválido o expirado.');
        } else {
          showMessage(data.mensaje || 'Error al actualizar contraseña.');
        }
      } catch (error) {
        showMessage('Error de conexión. Intenta nuevamente.');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Guardar nueva contraseña';
      }
    });

    modalCloseBtn.addEventListener('click', () => {
      modal.classList.remove('active');
    });
  </script>
</body>
</html>

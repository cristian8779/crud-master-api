<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Restablecer Contraseña</title>
  <link rel="stylesheet" href="css/reset-password.css" />
</head>
<body>
  <div class="container">
    <h2>Restablecer Contraseña</h2>
    <form id="resetForm" novalidate>
      <!-- Campo: Nueva contraseña -->
      <div class="password-field">
        <input type="password" id="newPassword" name="newPassword" placeholder="Ingresa tu nueva contraseña" required />
        <button type="button" class="toggle-password" aria-label="Mostrar contraseña" tabindex="-1">
          <svg class="eye eye-closed" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
            <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            <line x1="1" y1="1" x2="23" y2="23" stroke="#555" stroke-width="2"/>
          </svg>
          <svg class="eye eye-open" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24" style="display: none;">
            <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zM12 17a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            <circle cx="12" cy="12" r="2.5"/>
          </svg>
        </button>
      </div>

      <!-- Campo: Confirmar contraseña -->
      <div class="password-field">
        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirma tu nueva contraseña" required />
        <button type="button" class="toggle-password" aria-label="Mostrar contraseña" tabindex="-1">
          <svg class="eye eye-closed" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24">
            <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zm0 12a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            <line x1="1" y1="1" x2="23" y2="23" stroke="#555" stroke-width="2"/>
          </svg>
          <svg class="eye eye-open" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" width="24" height="24" style="display: none;">
            <path d="M12 5c-7 0-10 7-10 7s3 7 10 7 10-7 10-7-3-7-10-7zM12 17a5 5 0 1 1 0-10 5 5 0 0 1 0 10z"/>
            <circle cx="12" cy="12" r="2.5"/>
          </svg>
        </button>
      </div>

      <!-- Botón de envío -->
      <button type="submit" id="submitBtn">
        Guardar nueva contraseña
      </button>
    </form>

    <!-- Mensaje -->
    <div id="message" class="message"></div>
  </div>

  <!-- Modal -->
  <div id="modal" class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-content">
      <h3 id="modalTitle">¡Contraseña cambiada correctamente!</h3>
      <p>Ahora puedes iniciar sesión desde la app.</p>
      <button id="modalCloseBtn" type="button">Cerrar</button>
    </div>
  </div>

  <!-- Script -->
  <script src="js/reset-password.js"></script>
</body>
</html>
